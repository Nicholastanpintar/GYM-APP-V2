name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          CI: true
          REACT_APP_VAPID_PUBLIC_KEY: ${{ secrets.REACT_APP_VAPID_PUBLIC_KEY }}

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release-keystore.p12

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: release-keystore.p12
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: apexgym

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk apex-gym.apk

      - name: Publish latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "APEX GYM (latest build)"
          body: |
            Automatically built from the latest push to `main` (commit ${{ github.sha }}).

            Download `apex-gym.apk` below, open it on your Android phone, and allow installs
            from this source if prompted. Installing over a previous version keeps your data
            (workout logs, settings) since every build is signed with the same key.
          files: apex-gym.apk
          prerelease: true
          make_latest: true
